<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motive AI Vision</title>
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>
<body>

    <div id="main-container">
        <div id="drop-zone-global">
            <div class="upload-msg">
                <h1>Motive AI Vision</h1>
                <p> Drop Image </p>
                <button onclick="document.getElementById('fileInput').click()">Select Image</button>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
        </div>

        <div id="viewer" class="viewer-hidden">
            <div id="close-btn">&times;</div>
            
            <div class="content-area">
                <canvas id="canvas"></canvas>
                <div id="ai-status">AI Processing...</div>
            </div>

            <button id="ai-btn">✨ AI Auto-Enhance</button>

            <div class="vertical-controls">
                <span class="bar-label">Pixels</span>
                <input type="range" id="sharpness" min="0" max="10" step="0.5" value="0">
            </div>

            <div class="sticky-bar">
                <label>Brightness: <span id="bright-val">100%</span></label>
                <input type="range" id="brightness" min="0" max="400" value="100">
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
