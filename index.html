<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Motive AI Vision</title>
    
    <link rel="icon" type="image/png" href="favicon.png">
    
    <link rel="stylesheet" href="style.css">

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs"></script>
</head>
<body>

    <div id="main-container">
        <div id="drop-zone-global">
            <div class="upload-msg">
                <h1>Motive AI Vision</h1>
                <p>Drop Image</p>
                <button onclick="document.getElementById('fileInput').click()">Select Image</button>
            </div>
            <input type="file" id="fileInput" accept="image/*" style="display:none">
            
            <div class="footer-credit" style="position: absolute; bottom: 20px; right: 25px; font-size: 12px; color: rgba(255, 255, 255, 0.4); letter-spacing: 0.5px; pointer-events: none;">Open Source Tool by Arsalan &copy; 2026</div>
        </div>

        <div id="viewer" class="viewer-hidden">
            <div id="close-btn">&times;</div>
            
            <div class="content-area">
                <canvas id="canvas"></canvas>
                <div id="ai-status">AI Processing...</div>
            </div>

            <div class="top-left-controls">
                <button id="ai-btn" class="main-action-btn">✨ AI Enhance: OFF</button>

                <div class="control-box">
                    <span class="label">Pixels</span>
                    <div class="btn-group">
                        <button class="step-btn" onclick="adjustPixel(-1)">-</button>
                        <span id="pixel-val" class="val-display">0</span>
                        <button class="step-btn" onclick="adjustPixel(1)">+</button>
                    </div>
                </div>

                <div class="control-box">
                    <span class="label">Brightness</span>
                    <div class="btn-group">
                        <button class="step-btn" onclick="adjustBrightness(-50)">-</button>
                        <span id="bright-val" class="val-display">100%</span>
                        <button class="step-btn" onclick="adjustBrightness(50)">+</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
